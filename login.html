<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — MathIA</title>
  <meta name="description" content="Inicia sesión en tu cuenta de MathIA para continuar practicando y aprendiendo matemáticas con Inteligencia Artificial.">
  <meta property="og:title" content="Iniciar Sesión — MathIA">
  <meta property="og:description" content="Accede a tu cuenta de MathIA para continuar aprendiendo matemáticas con IA.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Ambient Glow Backdrops -->
  <div class="glow-backdrop" style="top: 20%; left: -10%;"></div>
  <div class="glow-backdrop" style="bottom: -10%; right: 10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(99, 102, 241, 0) 70%);"></div>

  <main class="login-container">
    <!-- Visual Panel (Left side on desktop) -->
    <section class="visual-panel">
      <div class="visual-content">
        <a href="index.html" class="logo visual-logo">
          <svg aria-hidden="true" class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 22h20L12 2zm0 4l6.5 13H5.5L12 6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 13h6M12 10v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Math<span class="text-gradient">IA</span></span>
        </a>
        <div class="quote-container">
          <p class="motivational-quote">"Cada ecuación resuelta es un paso hacia tu futuro."</p>
          <p class="quote-author text-muted">— MathIA Copilot</p>
        </div>
        <!-- Decorative SVG Mathematical Pattern -->
        <div class="geometry-pattern">
          <svg aria-hidden="true" viewBox="0 0 400 400" width="100%" height="100%" class="math-geometry-svg">
            <!-- Grid lines -->
            <line x1="50" y1="350" x2="350" y2="350" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5"/>
            <line x1="50" y1="50" x2="50" y2="350" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5"/>
            <!-- Triangle -->
            <polygon points="50,350 280,350 280,120" fill="none" stroke="url(#line-gradient)" stroke-width="2" stroke-linejoin="round"/>
            <!-- Circular Arc -->
            <path d="M 50,350 A 300,300 0 0,1 280,120" fill="none" stroke="var(--accent-secondary)" stroke-width="2" stroke-dasharray="6,4"/>
            <!-- Connecting lines -->
            <line x1="50" y1="350" x2="280" y2="120" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-dasharray="2,2"/>
            <!-- Math angles/labels -->
            <path d="M 80,350 A 30,30 0 0,0 74,328" fill="none" stroke="var(--accent-warm)" stroke-width="2"/>
            <text x="90" y="335" fill="var(--accent-warm)" class="font-mono" font-size="14">θ</text>
            <rect x="265" y="335" width="15" height="15" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>
            <!-- Dots at key points -->
            <circle cx="50" cy="350" r="5" fill="var(--accent-primary)"/>
            <circle cx="280" cy="350" r="5" fill="var(--accent-primary)"/>
            <circle cx="280" cy="120" r="5" fill="var(--accent-secondary)"/>
            <!-- Math symbols floating -->
            <text x="310" y="125" fill="var(--text-secondary)" class="font-mono" font-size="16">y = f(x)</text>
            <text x="160" y="375" fill="var(--text-muted)" class="font-mono" font-size="14">b = 280px</text>
            <text x="295" y="240" fill="var(--text-muted)" class="font-mono" font-size="14">a = 230px</text>
            <defs>
              <linearGradient id="line-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="var(--accent-primary)"/>
                <stop offset="100%" stop-color="var(--accent-secondary)"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
    </section>

    <!-- Form Panel (Right side on desktop) -->
    <section class="form-panel">
      <!-- Back Link for mobile view -->
      <a href="index.html" class="back-link mobile-only">
        <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Volver a la página principal</span>
      </a>

      <div class="card login-card">
        <div class="form-header text-center">
          <a href="index.html" class="logo form-logo mobile-only">
            <svg aria-hidden="true" class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 22h20L12 2zm0 4l6.5 13H5.5L12 6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M9 13h6M12 10v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Math<span class="text-gradient">IA</span></span>
          </a>
          <h1 class="form-title">Iniciar Sesión</h1>
          <p class="form-subtitle text-muted">Ingresa a tu cuenta para continuar aprendiendo</p>
        </div>

        <form id="login-form" novalidate>
          <!-- Email Input -->
          <div class="form-group" id="group-email">
            <label for="email" class="form-label">Correo Electrónico</label>
            <div class="form-input-container">
              <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
              <span class="form-input-icon">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
              </span>
              <span class="success-indicator" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </span>
            </div>
            <div class="form-error-msg" id="error-email" role="alert" aria-live="assertive" style="display: none;"></div>
          </div>

          <!-- Password Input -->
          <div class="form-group" id="group-password">
            <label for="password" class="form-label">Contraseña</label>
            <div class="form-input-container">
              <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
              <span class="form-input-icon">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
              </span>
              <!-- Toggle Visibility Button -->
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" id="eye-icon-show" class="toggle-icon">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
                <svg viewBox="0 0 24 24" id="eye-icon-hide" class="toggle-icon" style="display: none;">
                  <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                </svg>
              </button>
              <span class="success-indicator" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </span>
            </div>
            <div class="form-error-msg" id="error-password" role="alert" aria-live="assertive" style="display: none;"></div>
          </div>

          <!-- Options Checkbox / Forgot Link -->
          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox" id="remember-me">
              <span class="checkmark"></span>
              <span class="checkbox-label">Recuérdame</span>
            </label>
            <a href="#" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary btn-submit" id="btn-submit">
            <span class="btn-text">Iniciar Sesión</span>
            <!-- Spinner (hidden by default) -->
            <span class="spinner" id="btn-spinner" style="display: none;"></span>
          </button>
        </form>

        <!-- Social login separator -->
        <div class="separator-container">
          <span class="separator-line"></span>
          <span class="separator-text text-muted">o continúa con</span>
          <span class="separator-line"></span>
        </div>

        <!-- Social Buttons -->
        <div class="social-login-grid">
          <button type="button" class="btn btn-secondary social-btn">
            <svg aria-hidden="true" class="social-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>
          <button type="button" class="btn btn-secondary social-btn">
            <svg aria-hidden="true" class="social-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
            <span>GitHub</span>
          </button>
        </div>

        <div class="form-footer text-center">
          <p class="text-muted">¿No tienes cuenta? <a href="#" class="register-link">Regístrate gratis</a></p>
        </div>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/login.js"></script>
</body>
</html>
